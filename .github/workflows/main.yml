name: Trend Tech Auto Poster

on:
  schedule:
    - cron: '0 * * * *' # يشتغل كل ساعة
  workflow_dispatch: # زرار للتشغيل اليدوي

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        # تمت إضافة atproto هنا لحل مشكلة ModuleNotFoundError
        run: pip install requests feedparser groq atproto 

      - name: Run Auto Poster
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # إضافة بيانات حسابات باسكاي الثلاثة
          BS_USER_1: ${{ secrets.BS_USER_1 }}
          BS_PASS_1: ${{ secrets.BS_PASS_1 }}
          BS_USER_2: ${{ secrets.BS_USER_2 }}
          BS_PASS_2: ${{ secrets.BS_PASS_2 }}
          BS_USER_3: ${{ secrets.BS_USER_3 }}
          BS_PASS_3: ${{ secrets.BS_PASS_3 }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "TrendTech-Bot"
          git config --global user.email "bot@trendtech.com"
          git add posted_links.json
          git commit -m "Update posted links [skip ci]" || echo "No changes to commit"
          git push
