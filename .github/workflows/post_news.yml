name: Trend Tech Auto Poster

on:
  schedule:
    - cron: '0 * * * *' # يشتغل كل ساعة بالظبط
  workflow_dispatch: # زرار عشان تشغله يدوي للتجربة

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests feedparser groq

      - name: Run Auto Poster
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "TrendTech-Bot"
          git config --global user.email "bot@trendtech.com"
          git add posted_links.json
          git commit -m "Update posted links [skip ci]" || echo "No changes to commit"
          git push
